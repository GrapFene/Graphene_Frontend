name: Frontend — Build & Push & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/grapfene/graphene_frontend


jobs:

  build-and-push:
    name: Build & Push → GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max


  deploy-to-vm:
    name: Deploy → Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Pull new image and restart frontend-app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port:     22
          script: |
            set -euo pipefail

            cd /home/azureuser/graphene-infra

            echo "${{ secrets.GHCR_PAT }}" | \
              docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker compose --env-file .env pull frontend-app

            docker compose --env-file .env up -d --no-deps frontend-app

            docker image prune -f

            echo "✅ frontend-app restarted with latest image"
            docker compose ps
