# ============================================================
# nginx.conf — Production Nginx configuration for a Vite/React SPA
# ============================================================

# Run as the least-privileged user available in nginx:alpine
user  nginx;

# One worker per CPU core; "auto" lets Nginx detect the count at runtime
worker_processes  auto;

# Error log and PID file (standard paths inside the nginx:alpine image)
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# ── Events ─────────────────────────────────────────────────
events {
    # Maximum simultaneous connections per worker
    worker_connections  1024;
}

# ── HTTP ────────────────────────────────────────────────────
http {
    # ── MIME types ─────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip compression ───────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ── Server block ───────────────────────────────────────
    server {
        listen       80;
        server_name  _;            # accept any hostname

        # Serve static files from the directory Vite builds into
        root  /usr/share/nginx/html;
        index index.html;

        # ── Security headers ───────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # ── Cache policy for hashed static assets ──────────
        # Vite appends a content hash to JS/CSS filenames so they can be
        # cached aggressively — browsers revalidate only when the hash changes.
        location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── SPA catch-all ──────────────────────────────────
        # For every route that is NOT a real file or directory, fall back to
        # index.html and let React Router handle client-side navigation.
        # Without this, a hard refresh on any sub-route returns a 404.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Health-check endpoint ──────────────────────────
        # Useful for load-balancer / Docker HEALTHCHECK probes
        location /health {
            access_log  off;
            return      200 "OK\n";
            add_header  Content-Type text/plain;
        }

        # ── Hide Nginx version in error pages and headers ──
        server_tokens off;

        # ── Disable direct access to dot-files (.env, etc.) ─
        location ~ /\. {
            deny all;
        }
    }
}
